<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Etiquetas - Achados e Perdidos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Configurações visuais do painel de controle */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .config-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto 30px auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #cc0000;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #aa0000;
        }

        /* Área de visualização das etiquetas */
        #print-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Configuração exata para a Impressora Zebra (100mm x 50mm) */
        .zebra-label {
            width: 100mm;
            height: 50mm;
            background: white;
            border: 1px dashed #ccc; /* Borda pontilhada apenas para visualização na tela */
            padding: 5mm 6mm;
            box-sizing: border-box;
            page-break-after: always;
            display: flex;
            flex-direction: row; /* Posiciona o bloco do QR e o bloco dos campos lado a lado */
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            overflow: hidden;
        }

        /* Bloco Esquerdo: QR Code + Código por extenso abaixo */
        .left-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 35mm;
        }

        .qrcode-box {
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 3mm;
        }

        .label-code-text {
            font-size: 11pt;
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            text-align: center;
            white-space: nowrap;
        }

        /* Bloco Direito: Linhas verticais de preenchimento na ordem correta */
        .fields-block {
            font-size: 11pt;
            line-height: 2.3;
            width: 51mm;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .field-item {
            white-space: nowrap;
        }

        /* REGRAS EXCLUSIVAS PARA A IMPRESSÃO TÉRMICA */
        @media print {
            @page {
                size: 100mm 50mm;
                margin: 0;
            }
            body {
                margin: 0;
                background: white;
            }
            .config-panel {
                display: none; /* Esconde as configurações na folha impressa */
            }
            .zebra-label {
                border: none; /* Remove o pontilhado na impressão */
                margin: 0;
                page-break-after: always;
            }
        }
    </style>
</head>
<body>

    <div class="config-panel">
        <h2 style="text-align: center; margin-top: 0; color: #cc0000;">Configurador de Etiquetas (100x50mm)</h2>
        
        <div class="form-group">
            <label>Prefixo do Código:</label>
            <input type="text" id="prefix" value="2026-FLA">
        </div>
        
        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Número Inicial:</label>
                <input type="number" id="start-num" value="1">
            </div>
            <div style="flex: 1;">
                <label>Número Final:</label>
                <input type="number" id="end-num" value="50">
            </div>
        </div>

        <div class="form-group">
            <label>Dígitos do Sequencial (ex: 4 para 0001):</label>
            <input type="number" id="padding" value="4">
        </div>

        <button onclick="generateLabels()">Gerar e Abrir Impressão</button>
    </div>

    <div id="print-area"></div>

    <script>
        function generateLabels() {
            const prefix = document.getElementById('prefix').value;
            const startNum = parseInt(document.getElementById('start-num').value);
            const endNum = parseInt(document.getElementById('end-num').value);
            const padding = parseInt(document.getElementById('padding').value);
            const printArea = document.getElementById('print-area');
            
            // Limpa o histórico da tela
            printArea.innerHTML = '';

            // Loop para gerar cada etiqueta no intervalo desejado
            for (let i = startNum; i <= endNum; i++) {
                const numString = String(i).padStart(padding, '0');
                const fullCode = `${prefix}${numString}`;

                const label = document.createElement('div');
                label.className = 'zebra-label';
                
                label.innerHTML = `
                    <div class="left-block">
                        <div class="qrcode-box" id="qr-${i}"></div>
                        <div class="label-code-text">${fullCode}</div>
                    </div>
                    <div class="fields-block">
                        <div class="field-item"><strong>Data:</strong> _____________________</div>
                        <div class="field-item"><strong>Local:</strong> ____________________</div>
                        <div class="field-item"><strong>Recebido:</strong> _________________</div>
                    </div>
                `;

                printArea.appendChild(label);

                // Constrói o QR Code de forma nativa na lateral esquerda
                new QRCode(document.getElementById(`qr-${i}`), {
                    text: fullCode,
                    width: 80,
                    height: 80,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }

            // Ativa o comando de impressão do navegador automaticamente
            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
