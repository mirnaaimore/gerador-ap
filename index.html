<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Etiquetas A&P</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:720px;
    margin:auto;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#c00000;
    margin-bottom:20px;
    font-size:20px;
}

label{
    font-weight:bold;
    display:block;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:10px;
    font-size:14px;
    margin-bottom:10px;
}

.row{
    display:flex;
    gap:10px;
}

.row div{
    flex:1;
}

button{
    width:100%;
    padding:12px;
    border:none;
    cursor:pointer;
    font-weight:bold;
    font-size:14px;
    margin-top:10px;
    border-radius:6px;
}

.btn{
    background:#c00000;
    color:#fff;
}

.btn-reset{
    background:#333;
    color:#fff;
}

.preview{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

/* FORMATO IDEAL PARA EVITAR EMBARALHAMENTO */
.zebra{
    width: 84.9mm;
    height: 35.6mm;
    max-height: 35.6mm;
    display:flex;
    padding: 3mm 2mm 3mm 3mm;
    background:#fff;
    border:1px dashed #ccc; /* Apenas referência na tela */
    overflow: hidden;
}

.left{
    width: 20mm;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.qr{
    width: 65px;
    height: 65px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.code{
    font-size:11px;
    margin-top:2mm;
    font-weight:normal;
    text-align:center;
    white-space: nowrap;
}

.right{
    flex:1;
    padding-left: 5mm;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.field{
    display:flex;
    align-items:flex-end;
    font-size:3.8mm;
    font-weight:bold;
    color: #000;
}

.line{
    flex:1;
    border-bottom:1px solid #000;
    margin-left:2mm;
    margin-bottom:0.5mm;
}

/* REGRAS DE IMPRESSÃO ESTÁVEIS (CORRIGE A TELA EM BRANCO) */
@media print{
    @page{
        size: 84.9mm 35.6mm;
        margin: 0 !important;
    }

    html, body{
        background:#fff !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 84.9mm !important;
        height: 35.6mm !important;
    }

    .container{
        display:none !important;
    }

    #printArea{
        display:block !important;
        width: 84.9mm !important;
        height: 35.6mm !important;
    }

    .zebra{
        border:none !important;
        margin: 0 !important;
        padding: 3mm 2mm 3mm 3mm !important;
        width: 84.9mm !important;
        height: 35.6mm !important;
        page-break-after:always !important;
        break-after: page !important;
    }
}

#printArea{
    display:none;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>Gerador de Etiquetas A&P</h1>

        <label>Prefixo</label>
        <input id="prefix" value="2026-FLA">

        <div class="row">
            <div>
                <label>Inicial</label>
                <input type="number" id="start" value="1">
            </div>
            <div>
                <label>Quantidade</label>
                <input type="number" id="qty" value="100">
            </div>
        </div>

        <button class="btn" onclick="generate()">GERAR E IMPRIMIR</button>
        <button class="btn-reset" onclick="reset()">ZERAR SEQUÊNCIA</button>

        <div class="preview">Pré-visualização</div>
        <div id="preview"></div>
    </div>
</div>

<div id="printArea"></div>

<script>
function pad(num){
    return String(num).padStart(5,'0');
}

function makeLabel(code,id){
    return `
    <div class="zebra">
        <div class="left">
            <div class="qr" id="${id}"></div>
            <div class="code">${code}</div>
        </div>

        <div class="right">
            <div class="field">Data<div class="line"></div></div>
            <div class="field">Local<div class="line"></div></div>
            <div class="field">Recebido<div class="line"></div></div>
        </div>
    </div>`;
}

function preview(){
    const prefix = document.getElementById("prefix").value;
    const start = parseInt(document.getElementById("start").value);
    const code = prefix + pad(start);

    document.getElementById("preview").innerHTML = makeLabel(code,"prevqr");

    new QRCode(document.getElementById("prevqr"),{
        text:code,
        width:65,
        height:65,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.M
    });
}

function generate(){
    const prefix = document.getElementById("prefix").value;
    const start = parseInt(document.getElementById("start").value);
    const qty = parseInt(document.getElementById("qty").value);
    const area = document.getElementById("printArea");
    
    area.innerHTML = "";
    let current = start;

    for(let i=0;i<qty;i++){
        const code = prefix + pad(current);
        const id = "qr"+current;
        area.innerHTML += makeLabel(code,id);
        current++;
    }

    setTimeout(()=>{
        for(let i=start;i<start+qty;i++){
            const code = document.getElementById("prefix").value + pad(i);
            new QRCode(document.getElementById("qr"+i),{
                text:code,
                width:65,
                height:65,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });
        }

        localStorage.setItem("last", start+qty);
        window.print();
    },300);
}

function reset(){
    if(confirm("Zerar sequência?")){
        localStorage.removeItem("last");
        alert("Zerado!");
    }
}

window.onload = function() {
    const saved = localStorage.getItem("last");
    if(saved) {
        document.getElementById("start").value = saved;
    }
};

document.getElementById("prefix").oninput = preview;
document.getElementById("start").oninput = preview;

preview();
</script>

</body>
</html>
