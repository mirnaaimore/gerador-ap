<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Etiquetas A&P</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Configurações do painel na tela */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .config-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto 30px auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #cc0000;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #aa0000;
        }

        #print-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Limite físico estrito: 82mm x 32mm para evitar encavalamento */
        .zebra-label {
            width: 82mm;
            height: 32mm;
            max-height: 32mm;
            background: white;
            border: 1px dashed #ccc; /* Apenas referência em tela */
            padding: 2mm 4mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: row;
            justify-content: space-between; /* Força QR na esquerda e texto na direita */
            align-items: center;
            margin-bottom: 15px;
            overflow: hidden;
            page-break-after: always !important;
            page-break-inside: avoid !important;
            break-inside: avoid !important;
        }

        /* Bloco Esquerdo: QR Code menor e afastado para a ponta esquerda */
        .left-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 25mm;
            height: 100%;
        }

        .qrcode-box {
            width: 75px; /* Reduzido para dar espaço ao texto */
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1.5mm;
        }

        .label-code-text {
            font-size: 9.5pt;
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            text-align: center;
            white-space: nowrap;
        }

        /* Bloco Direito: Linhas curtas e com ótimo espaço vertical para não embolar */
        .fields-block {
            font-size: 10.5pt;
            line-height: 1.8; /* Espaçamento vertical amplo */
            width: 42mm; /* Largura controlada para manter distância do QR Code */
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .field-item {
            white-space: nowrap;
            width: 100%;
        }

        /* Configurações de Impressão Térmica */
        @media print {
            @page {
                size: 84.9mm 35.6mm;
                margin: 0 !important;
            }
            html, body {
                margin: 0 !important;
                padding: 0 !important;
                width: 84.9mm;
                height: 35.6mm;
                background: white;
            }
            .config-panel {
                display: none !important;
            }
            #print-area {
                display: block !important;
                width: 84.9mm;
            }
            .zebra-label {
                border: none !important;
                margin: 0 !important;
                padding: 2mm 4mm !important;
                width: 82mm !important;
                height: 32mm !important;
                max-height: 32mm !important;
                page-break-after: always !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                overflow: hidden !important;
            }
        }
    </style>
</head>
<body>

    <div class="config-panel">
        <h2 style="text-align: center; margin-top: 0; color: #cc0000;">Etiquetas A&P</h2>
        
        <div class="form-group">
            <label>Prefixo do Código:</label>
            <input type="text" id="prefix" value="2026-FLA">
        </div>
        
        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Número Inicial:</label>
                <input type="number" id="start-num" value="1">
            </div>
            <div style="flex: 1;">
                <label>Número Final:</label>
                <input type="number" id="end-num" value="50">
            </div>
        </div>

        <div class="form-group">
            <label>Dígitos do Sequencial:</label>
            <input type="number" id="padding" value="4">
        </div>

        <button onclick="generateLabels()">Gerar e Abrir Impressão</button>
    </div>

    <div id="print-area"></div>

    <script {nonce}>
        function generateLabels() {
            const prefix = document.getElementById('prefix').value;
            const startNum = parseInt(document.getElementById('start-num').value);
            const endNum = parseInt(document.getElementById('end-num').value);
            const padding = parseInt(document.getElementById('padding').value);
            const printArea = document.getElementById('print-area');
            
            printArea.innerHTML = '';

            for (let i = startNum; i <= endNum; i++) {
                const numString = String(i).padStart(padding, '0');
                const fullCode = `${prefix}${numString}`;

                const label = document.createElement('div');
                label.className = 'zebra-label';
                
                label.innerHTML = `
                    <div class="left-block">
                        <div class="qrcode-box" id="qr-${i}"></div>
                        <div class="label-code-text">${fullCode}</div>
                    </div>
                    <div class="fields-block">
                        <div class="field-item"><strong>Data:</strong> ______________</div>
                        <div class="field-item"><strong>Local:</strong> _____________</div>
                        <div class="field-item"><strong>Recebido:</strong> __________</div>
                    </div>
                `;

                printArea.appendChild(label);

                new QRCode(document.getElementById(`qr-${i}`), {
                    text: fullCode,
                    width: 75,
                    height: 75,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }

            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
