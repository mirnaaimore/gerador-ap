```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Etiquetas A&P</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 3px 12px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#c00000;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    font-size:16px;
}

.row{
    display:flex;
    gap:10px;
}

.row .form-group{
    flex:1;
}

button{
    width:100%;
    border:none;
    padding:14px;
    margin-top:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    border-radius:8px;
}

.btn-print{
    background:#c00000;
    color:white;
}

.btn-reset{
    background:#333;
    color:white;
}

.info{
    margin-top:15px;
    text-align:center;
    font-size:14px;
    color:#666;
}

.preview-title{
    margin:30px 0 10px;
    text-align:center;
    font-weight:bold;
}

/* ETIQUETA */

.zebra-label{

    width:100mm;
    height:50mm;

    background:white;

    display:flex;

    padding:2mm;

    border:1px dashed #bbb;

    margin:auto;

    overflow:hidden;
}

.left-side{

    width:34mm;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.qr-box{

    width:28mm;
    height:28mm;

    display:flex;
    justify-content:center;
    align-items:center;
}

.code-text{

    margin-top:2mm;

    font-size:12px;
    font-weight:bold;

    text-align:center;

    letter-spacing:1px;
}

.right-side{

    flex:1;

    display:flex;
    flex-direction:column;

    justify-content:space-evenly;

    padding-left:4mm;
}

.field{

    display:flex;
    align-items:flex-end;

    font-size:6mm;
    font-weight:bold;
}

.line{

    flex:1;

    border-bottom:1.5px solid black;

    margin-left:3mm;
    margin-bottom:1mm;
}

#print-area{
    display:none;
}

@media print{

    @page{
        size:100mm 50mm;
        margin:0;
    }

    body{
        background:white;
        padding:0;
    }

    .container{
        display:none;
    }

    #print-area{
        display:block;
    }

    .zebra-label{
        border:none;
        margin:0;
        page-break-after:always;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Gerador de Etiquetas A&P</h1>

        <div class="form-group">
            <label>Prefixo</label>
            <input id="prefix" value="2026-FLA">
        </div>

        <div class="row">

            <div class="form-group">
                <label>Primeiro Número</label>
                <input type="number" id="start">
            </div>

            <div class="form-group">
                <label>Quantidade</label>
                <input type="number" id="quantity" value="100">
            </div>

        </div>

        <div class="form-group">
            <label>Dígitos do Sequencial</label>
            <input type="number" id="padding" value="4">
        </div>

        <button class="btn-print" onclick="generateAndPrint()">
            GERAR E IMPRIMIR
        </button>

        <button class="btn-reset" onclick="resetCounter()">
            ZERAR SEQUÊNCIA
        </button>

        <div class="info">
            Último número salvo:
            <span id="last-number">0</span>
        </div>

    </div>

    <div class="preview-title">
        Pré-visualização
    </div>

    <div id="preview"></div>

</div>

<div id="print-area"></div>

<script>

function loadCounter(){

    let last =
        localStorage.getItem("lastPrintedNumber");

    if(!last){
        last = 0;
    }

    document.getElementById("last-number").innerText = last;

    document.getElementById("start").value =
        parseInt(last) + 1;

    createPreview();
}

function resetCounter(){

    if(confirm("Deseja realmente zerar a sequência?")){

        localStorage.removeItem(
            "lastPrintedNumber"
        );

        loadCounter();
    }
}

function createLabelHTML(code,id){

    return `
        <div class="zebra-label">

            <div class="left-side">

                <div class="qr-box" id="${id}"></div>

                <div class="code-text">
                    ${code}
                </div>

            </div>

            <div class="right-side">

                <div class="field">
                    Data
                    <div class="line"></div>
                </div>

                <div class="field">
                    Local
                    <div class="line"></div>
                </div>

                <div class="field">
                    Recebido
                    <div class="line"></div>
                </div>

            </div>

        </div>
    `;
}

function createPreview(){

    const prefix =
        document.getElementById("prefix").value;

    const start =
        parseInt(document.getElementById("start").value || 1);

    const padding =
        parseInt(document.getElementById("padding").value || 4);

    const code =
        prefix + String(start).padStart(padding,"0");

    const preview =
        document.getElementById("preview");

    preview.innerHTML =
        createLabelHTML(code,"previewQR");

    new QRCode(
        document.getElementById("previewQR"),
        {
            text:code,
            width:150,
            height:150
        }
    );
}

function generateAndPrint(){

    const prefix =
        document.getElementById("prefix").value;

    const start =
        parseInt(document.getElementById("start").value);

    const quantity =
        parseInt(document.getElementById("quantity").value);

    const padding =
        parseInt(document.getElementById("padding").value);

    const printArea =
        document.getElementById("print-area");

    printArea.innerHTML = "";

    let current = start;

    for(let i=0;i<quantity;i++){

        const code =
            prefix +
            String(current)
            .padStart(padding,"0");

        const qrId = "qr" + current;

        printArea.innerHTML +=
            createLabelHTML(code,qrId);

        current++;
    }

    setTimeout(()=>{

        for(let i=start;i<start+quantity;i++){

            const code =
                prefix +
                String(i)
                .padStart(padding,"0");

            new QRCode(
                document.getElementById("qr"+i),
                {
                    text:code,
                    width:150,
                    height:150
                }
            );
        }

        localStorage.setItem(
            "lastPrintedNumber",
            start + quantity - 1
        );

        setTimeout(()=>{

            window.print();

            loadCounter();

        },1000);

    },300);
}

document
.getElementById("prefix")
.addEventListener("input",createPreview);

document
.getElementById("start")
.addEventListener("input",createPreview);

document
.getElementById("padding")
.addEventListener("input",createPreview);

loadCounter();

</script>

</body>
</html>
