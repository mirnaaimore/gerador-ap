<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Etiquetas A&P</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Painel de Controle em Tela */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .config-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto 30px auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #cc0000;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #aa0000;
        }

        #print-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ÁREA DA ETIQUETA CORRIGIDA: Forçando 100mm x 50mm */
        .zebra-label {
            width: 100mm;
            height: 50mm;
            background: white;
            border: 1px dashed #bbb; /* Referência visual na tela */
            padding: 5mm 8mm 5mm 5mm; /* Margens internas seguras */
            box-sizing: border-box;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            overflow: hidden;
            page-break-after: always !important;
            break-inside: avoid !important;
        }

        /* Bloco Esquerdo: QR Code + Texto */
        .left-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 35mm; /* Proporcional ao novo tamanho */
            height: 100%;
        }

        .qrcode-box {
            width: 32mm;
            height: 32mm;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .label-code-text {
            font-size: 12pt;
            font-weight: normal;
            text-align: center;
            white-space: nowrap;
            margin-top: 2mm;
            font-family: Arial, sans-serif;
            letter-spacing: 0.5px;
            color: #000;
        }

        /* Bloco Direito Otimizado */
        .fields-container {
            flex-grow: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Distribui os campos verticalmente */
            box-sizing: border-box;
            padding-left: 5mm;
            padding-top: 2mm;
            padding-bottom: 2mm;
        }

        .field-item {
            font-size: 16pt; /* Aumentado para melhor leitura no tamanho 100x50 */
            font-weight: bold;
            color: #000;
            white-space: nowrap;
            display: flex;
            align-items: flex-end;
            width: 100%;
        }

        /* Linha automática comprida */
        .line-fill {
            flex-grow: 1;
            border-bottom: 2px solid #000;
            margin-left: 8px;
            margin-bottom: 4px;
        }

        /* CORREÇÃO DO SPOOLER DE IMPRESSÃO ZEBRA */
        @media print {
            @page {
                size: 100mm 50mm; /* Tamanho exato da sua etiqueta física */
                margin: 0 !important;
            }
            html, body {
                margin: 0 !important;
                padding: 0 !important;
                background: white;
                width: 100mm;
                height: 50mm;
            }
            .config-panel {
                display: none !important;
            }
            .zebra-label {
                border: none !important;
                margin: 0 !important;
                box-shadow: none !important;
                width: 100mm !important;
                height: 50mm !important;
                page-break-after: always !important;
            }
        }
    </style>
</head>
<body>

    <div class="config-panel">
        <h2 style="text-align: center; margin-top: 0; color: #cc0000;">Etiquetas A&P</h2>
        
        <div class="form-group">
            <label>Prefixo do Código:</label>
            <input type="text" id="prefix" value="2026-FLA">
        </div>
        
        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Número Inicial:</label>
                <input type="number" id="start-num" value="1">
            </div>
            <div style="flex: 1;">
                <label>Número Final:</label>
                <input type="number" id="end-num" value="50">
            </div>
        </div>

        <div class="form-group">
            <label>Dígitos do Sequencial:</label>
            <input type="number" id="padding" value="4">
        </div>

        <button onclick="generateLabels()">Gerar e Abrir Impressão</button>
    </div>

    <div id="print-area"></div>

    <script>
        window.onload = function() {
            const savedLastNum = localStorage.getItem('lastPrintedNumber');
            if (savedLastNum) {
                const nextStart = parseInt(savedLastNum) + 1;
                document.getElementById('start-num').value = nextStart;
                document.getElementById('end-num').value = nextStart + 49;
            }
        };

        function generateLabels() {
            const prefix = document.getElementById('prefix').value;
            const startNum = parseInt(document.getElementById('start-num').value);
            const endNum = parseInt(document.getElementById('end-num').value);
            const padding = parseInt(document.getElementById('padding').value);
            const printArea = document.getElementById('print-area');
            
            printArea.innerHTML = '';

            // Conversão aproximada de 32mm para pixels para o gerador de QR Code (~120px)
            const qrSizeInPx = 120;

            for (let i = startNum; i <= endNum; i++) {
                const numString = String(i).padStart(padding, '0');
                const fullCode = `${prefix}${numString}`;

                const label = document.createElement('div');
                label.className = 'zebra-label';
                
                label.innerHTML = `
                    <div class="left-block">
                        <div class="qrcode-box" id="qr-${i}"></div>
                        <div class="label-code-text">${fullCode}</div>
                    </div>
                    <div class="fields-container">
                        <div class="field-item">Data:<div class="line-fill"></div></div>
                        <div class="field-item">Local:<div class="line-fill"></div></div>
                        <div class="field-item">Recebido:<div class="line-fill"></div></div>
                    </div>
                `;

                printArea.appendChild(label);

                new QRCode(document.getElementById(`qr-${i}`), {
                    text: fullCode,
                    width: qrSizeInPx,
                    height: qrSizeInPx,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });
            }

            localStorage.setItem('lastPrintedNumber', endNum);

            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
