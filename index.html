<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Etiquetas A&P</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Configurações do painel na tela */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .config-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto 30px auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #cc0000;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #aa0000;
        }

        #print-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Limite físico rígido: 82mm x 32mm */
        .zebra-label {
            width: 82mm;
            height: 32mm;
            max-height: 32mm;
            background: white;
            border: 1px dashed #ccc; /* Apenas referência na tela */
            padding: 1mm 2mm;
            box-sizing: border-box;
            margin-bottom: 15px;
            overflow: hidden;
            page-break-after: always !important;
            page-break-inside: avoid !important;
            break-inside: avoid !important;
        }

        /* Tabela estrutural interna para blindar o layout */
        .label-table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .col-left {
            width: 28mm; /* Espaço do QR Code */
            text-align: center;
            vertical-align: middle;
        }

        .col-right {
            width: 50mm; /* Espaço dos textos */
            vertical-align: middle;
            padding-left: 1mm; /* TEXTO PUXADO PARA A ESQUERDA: reduzido de 4mm para 1mm */
            box-sizing: border-box;
        }

        .qrcode-box {
            width: 70px;
            height: 70px;
            margin: 0 auto 1mm auto;
            display: block;
        }

        .label-code-text {
            font-size: 9pt;
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            white-space: nowrap;
        }

        /* Configuração das linhas de texto */
        .fields-container {
            font-size: 10.5pt;
            line-height: 1.8;
        }

        .field-item {
            white-space: nowrap;
        }

        /* Configurações de Impressão Térmica */
        @media print {
            @page {
                size: 84.9mm 35.6mm;
                margin: 0 !important;
            }
            html, body {
                margin: 0 !important;
                padding: 0 !important;
                width: 84.9mm;
                height: 35.6mm;
                background: white;
            }
            .config-panel {
                display: none !important;
            }
            #print-area {
                display: block !important;
                width: 84.9mm;
            }
            .zebra-label {
                border: none !important;
                margin: 0 !important;
                padding: 1mm 2mm !important;
                width: 82mm !important;
                height: 32mm !important;
                max-height: 32mm !important;
                page-break-after: always !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                overflow: hidden !important;
            }
        }
    </style>
</head>
<body>

    <div class="config-panel">
        <h2 style="text-align: center; margin-top: 0; color: #cc0000;">Etiquetas A&P</h2>
        
        <div class="form-group">
            <label>Prefixo do Código:</label>
            <input type="text" id="prefix" value="2026-FLA">
        </div>
        
        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Número Inicial:</label>
                <input type="number" id="start-num" value="1">
            </div>
            <div style="flex: 1;">
                <label>Número Final:</label>
                <input type="number" id="end-num" value="50">
            </div>
        </div>

        <div class="form-group">
            <label>Dígitos do Sequencial:</label>
            <input type="number" id="padding" value="4">
        </div>

        <button onclick="generateLabels()">Gerar e Abrir Impressão</button>
    </div>

    <div id="print-area"></div>

    <script {nonce}>
        function generateLabels() {
            const prefix = document.getElementById('prefix').value;
            const startNum = parseInt(document.getElementById('start-num').value);
            const endNum = parseInt(document.getElementById('end-num').value);
            const padding = parseInt(document.getElementById('padding').value);
            const printArea = document.getElementById('print-area');
            
            printArea.innerHTML = '';

            for (let i = startNum; i <= endNum; i++) {
                const numString = String(i).padStart(padding, '0');
                const fullCode = `${prefix}${numString}`;

                const label = document.createElement('div');
                label.className = 'zebra-label';
                
                label.innerHTML = `
                    <table class="label-table">
                        <tr>
                            <td class="col-left">
                                <div class="qrcode-box" id="qr-${i}"></div>
                                <div class="label-code-text">${fullCode}</div>
                            </td>
                            <td class="col-right">
                                <div class="fields-container">
                                    <div class="field-item"><strong>Data:</strong> ___________</div>
                                    <div class="field-item"><strong>Local:</strong> __________</div>
                                    <div class="field-item"><strong>Recebido:</strong> _______</div>
                                </div>
                            </td>
                        </tr>
                    </table>
                `;

                printArea.appendChild(label);

                new QRCode(document.getElementById(`qr-${i}`), {
                    text: fullCode,
                    width: 70,
                    height: 70,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }

            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
